<!doctype html>
<html>
    <head>
        <title>Log In | Timetable Database</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">
        <link rel="stylesheet" href="{{ url_for('static', filename='style/main.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='style/account.css') }}">
        <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
    </head>
    <body>
        <header>
            <h1>Log In | Timetable Database</h1>
        </header>
        <div class="container">
            <form method="post" action="/login" class="account_form">
                <input class="account_input" type="text" name="username" placeholder="Username" required>
                <br>
                <input class="account_input" type="password" name="password" placeholder="Password" required >
                <br>
                <input class="account_submit" type="submit" value="Log In">
            </form>
            {% if password_error %}
            <h3 class="error">Username or Password was incorrect.</h3>
            {% endif %}
            <p>Don't have an account? <a href="/signup">Create one here</a></p>
        </div>
    </body>
</html>
